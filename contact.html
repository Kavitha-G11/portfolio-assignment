<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Jane Doe | Get In Touch</title>
    <meta name="description" content="Contact Jane Doe for frontend development contracts, consulting work, or full-time opportunities. Accessible and secure communication.">
    <link rel="canonical" href="https://example.com/contact.html">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header">
        <div class="header-container">
            <span class="site-logo" aria-label="Jane Doe Portfolio Home">JD.</span>
            <nav aria-label="Main Navigation">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="contact.html" aria-current="page">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main-content">
        <section class="contact-section" aria-labelledby="form-heading">
            <div class="form-container">
                <h1 id="form-heading">Let's Connect</h1>
                <p>Fill out the form below, and I will get back to you within 24 hours.</p>

                <form action="#" method="POST" class="accessible-form">
                    
                    <div class="form-group">
                        <label for="name">Full Name <span aria-hidden="true">*</span></label>
                        <input type="text" id="name" name="name" required aria-required="true" autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address <span aria-hidden="true">*</span></label>
                        <input type="email" id="email" name="email" required aria-required="true" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="message">Message <span aria-hidden="true">*</span></label>
                        <textarea id="message" name="message" rows="6" required aria-required="true"></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Send Message</button>
                </form>

            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Jane Doe. All rights reserved. Built with strict HTML5 and WCAG standards.</p>
        </div>
    </footer>

</body>
</html>
